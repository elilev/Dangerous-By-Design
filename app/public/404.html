<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dangerous by Design 2026</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect: https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this file for any unknown path (e.g. a client-side
      // route refreshed directly). Redirect to index.html, encoding the
      // original path in the query string so it can be restored there.
      var pathSegmentsToKeep = 1; // "/Dangerous-By-Design"
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
